<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高一会计练习（含隐藏答案）</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", Arial;
      background: #f9fafb;
      margin: 0;
      padding: 0;
      line-height: 1.8;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #eee;
    }

    h1 {
      color: #1e3a8a;
      margin-bottom: 20px;
    }

    .question {
      background: #f1f5f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #1e3a8a;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #1e3a8a;
      color: white;
      cursor: pointer;
    }

    .answer {
      margin-top: 10px;
      padding: 10px;
      background: #eef2ff;
      border-left: 4px solid #1e3a8a;
      display: none;
      border-radius: 6px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>📘 会计练习（点击查看答案）</h1>

  <!-- 题目1 -->
  <div class="question">
    <p><strong>1.</strong> 什么是会计？</p>
    <button onclick="toggleAnswer('a1')">显示 / 隐藏答案</button>
    <div class="answer" id="a1">
      会计是对经济交易进行记录、分类、汇总，并提供财务信息以供决策的过程。
    </div>
  </div>

  <!-- 题目2 -->
  <div class="question">
    <p><strong>2.</strong> 会计的基本等式是什么？</p>
    <button onclick="toggleAnswer('a2')">显示 / 隐藏答案</button>
    <div class="answer" id="a2">
      资产 = 负债 + 权益
    </div>
  </div>

  <!-- 题目3 -->
  <div class="question">
    <p><strong>3.</strong> 借贷记账法中，资产增加应该记在借方还是贷方？</p>
    <button onclick="toggleAnswer('a3')">显示 / 隐藏答案</button>
    <div class="answer" id="a3">
      资产增加记在借方。
    </div>
  </div>

  <!-- 题目4 -->
  <div class="question">
    <p><strong>4.</strong> 收入增加记在借方还是贷方？</p>
    <button onclick="toggleAnswer('a4')">显示 / 隐藏答案</button>
    <div class="answer" id="a4">
      收入增加记在贷方。
    </div>
  </div>

  <!-- 题目5 -->
  <div class="question">
    <p><strong>5.</strong> 如果公司赚到利润，公式是什么？</p>
    <button onclick="toggleAnswer('a5')">显示 / 隐藏答案</button>
    <div class="answer" id="a5">
      利润 = 收入 - 费用
    </div>
  </div>

</div>

<script>
  function toggleAnswer(id) {
    var ans = document.getElementById(id);
    if (ans.style.display === "none" || ans.style.display === "") {
      ans.style.display = "block";
    } else {
      ans.style.display = "none";
    }
  }
</script>

</body>
</html>
