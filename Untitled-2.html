<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>独中高一会计学习平台</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", Arial;
    }

    body {
      background: #f9fafb;
      color: #111;
      line-height: 1.6;
    }

    /* 导航栏 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
      color: #1e3a8a;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #1e3a8a;
    }

    /* 首页横幅 */
    .hero {
      padding: 80px 8%;
      text-align: center;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    .hero p {
      color: #555;
      max-width: 600px;
      margin: auto;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      background: #1e3a8a;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    /* 内容区块 */
    .section {
      padding: 60px 8%;
    }

    .section h2 {
      margin-bottom: 25px;
      font-size: 26px;
    }

    /* 网格 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #eee;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .card p {
      color: #555;
      font-size: 14px;
    }

    /* 页脚 */
    footer {
      text-align: center;
      padding: 30px;
      background: white;
      border-top: 1px solid #eee;
      margin-top: 40px;
      color: #666;
    }

    /* 手机适配 */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 28px;
      }

      .navbar {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- 导航栏 -->
<div class="navbar">
    <div class="logo">会计学习平台</div>
    <div class="nav-links">
      <a href="edu.html">首页</a>
      <a href="exe.html">课程</a>
      <a href="notteeee.html">笔记</a>
      <a href="exeee.html">练习</a>
  </div>
  </div>

  <!-- 首页 -->
  <div class="hero">
    <h1>轻松学会独中高一会计</h1>
    <p>
      
      帮助你更容易理解会计概念。
    </p>
    <a href="#" class="btn">开始学习</a>
  </div>

  <!-- 课程 -->
  <div class="section">
    <h2>课程章节</h2>

    <div class="grid">
      <div class="card">
        <h3><a href="chp1.html">第一章：会计基础</a></h3>
        <p>了解会计的定义、目的以及基本概念。</p>
      </div>

      <div class="card">
        <h3><a href="chp2.html">第二章：资产、负债与权益</a></h3>
        <p>学习三大要素及其分类和关系。</p>
      </div>

      <div class="card">
        <h3><a href="chp3.html">第三章：借贷记账法</a></h3>
        <p>掌握借方与贷方的基本规则与分录。</p>
      </div>

      <div class="card">
        <h3><a href="chp4.html">第四章：分类账</a></h3>
        <p>学习如何将分录过账到分类账。</p>
      </div>
    </div>
  </div>

  <!-- 笔记 -->
  <div class="section">
    <h2>学习笔记</h2>

    <div class="grid">
      <div class="card">
        <h3><a href="note.html">重点整理</a></h3>
        <p>考试前快速复习的重点总结。</p>
      </div>

      <div class="card">
        <h3><a href="pic.html">图解说明</a></h3>
        <p>通过图表帮助理解复杂概念。</p>
      </div>

      <div class="card">
        <h3><a href="gongsi.html">公式整理</a></h3>
        <p>重要的会计等式与计算公式。</p>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer>
    
  </footer>

</body>
</html>
